<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員儀表板 v2.2.1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
                <div class="position-sticky pt-3 sidebar-sticky">
                    <h4 class="sidebar-heading px-3 mt-2 mb-3">管理員儀表板</h4>
                    <div class="px-3 mb-3">
                        <a href="/" class="btn btn-outline-secondary w-100"><i class="bi bi-arrow-left-circle"></i> 返回首頁</a>
                    </div>
                    <hr>
                    <h6 class="sidebar-heading px-3 mt-4 mb-2 text-muted">排班月份選擇</h6>
                    <div class="px-3">
                        <div class="mb-2">
                            <label for="admin-year-select" class="form-label">年份</label>
                            <select id="admin-year-select" class="form-select"></select>
                        </div>
                        <div class="mb-3">
                            <label for="admin-month-select" class="form-label">月份</label>
                            <select id="admin-month-select" class="form-select"></select>
                        </div>
                    </div>
                    <hr>
                    <div class="px-3">
                        <div class="d-grid gap-2">
                             <button id="save-settings-btn" class="btn btn-success">
                                <i class="bi bi-save-fill"></i> 儲存醫師設定
                            </button>
                            <button id="run-scheduler-btn" class="btn btn-primary btn-lg" disabled>
                                <i class="bi bi-calculator-fill"></i> 一鍵排班
                            </button>
                        </div>
                        <small id="run-scheduler-help" class="form-text text-muted d-block mt-2">請先設定並儲存所有醫師的區域/點數。</small>
                    </div>
                </div>
            </nav>

            <main class="col-md-9 col-lg-10 ms-sm-auto px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">總醫師設定面板</h1>
                    <h3 id="settings-month-title" class="h4 text-muted"></h3>
                </div>

                <div class="card mb-4 bg-light border-warning">
                    <div class="card-header d-flex justify-content-between align-items-center bg-warning-subtle">
                        <span><i class="bi bi-tools"></i> 開發者除錯面板</span>
                        <button class="btn btn-sm btn-outline-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#debug-panel-collapse" aria-expanded="false" aria-controls="debug-panel-collapse">
                            顯示/隱藏
                        </button>
                    </div>
                    <div class="collapse" id="debug-panel-collapse">
                        <div class="card-body">
                            <p class="text-muted"><small>此面板僅供開發測試使用，用於快速準備或清除測試資料。</small></p>
                            <div class="d-flex gap-2">
                                <button id="load-template-btn" class="btn btn-outline-primary"><i class="bi bi-box-arrow-in-down"></i> 載入預設醫師範本</button>
                                <button id="clear-month-btn" class="btn btn-outline-danger"><i class="bi bi-trash3-fill"></i> 清空本月所有資料</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-person-lines-fill"></i> 醫師設定</span>
                        <button class="btn btn-sm btn-outline-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#doctor-settings-collapse" aria-expanded="true" aria-controls="doctor-settings-collapse">
                            <i class="bi bi-arrows-collapse"></i> 收合/展開
                        </button>
                    </div>
                    <div class="collapse show" id="doctor-settings-collapse">
                        <div class="card-body">
                             <div class="table-responsive">
                                <table class="table table-hover" id="doctor-settings-table">
                                    <thead>
                                        <tr>
                                            <th style="width: 5%;"><i class="bi bi-grip-vertical"></i></th>
                                            <th>醫師姓名</th>
                                            <th>預休狀態</th>
                                            <th>區域</th>
                                            <th>點數上限</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="doctor-settings-tbody">
                                        </tbody>
                                </table>
                            </div>
                        </div>
                        <div class="card-footer">
                             <button class="btn btn-outline-primary btn-sm" id="add-doctor-btn">
                                <i class="bi bi-plus-circle"></i> 手動新增醫師
                            </button>
                            <small class="text-muted ms-2">提示：您可以拖曳醫師列來快速變更區域。</small>
                        </div>
                    </div>
                </div>


                <div class="card mb-4">
                    </div>
                
                <div id="results-section" class="d-none">
                    </div>
            </main>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
