<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧排班系統 - 首頁</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="text-center auth-container p-5 rounded-3 shadow">
            <img src="https://www.gstatic.com/images/icons/material/system/2x/event_available_googblue_48dp.png" alt="Logo" class="mb-4">
            <h1 class="mb-4">智慧排班系統</h1>
            <p class="text-muted mb-4">請選擇您的身份以繼續</p>
            <div class="d-grid gap-3">
                <a href="/doctor" class="btn btn-primary btn-lg">我是醫師</a>
                <div class="btn-group">
                    <a href="/admin?debug=true" class="btn btn-outline-secondary btn-lg w-100">我是排班管理員 (正常模式)</a>
                    <button type="button" class="btn btn-outline-secondary dropdown-toggle dropdown-toggle-split" data-bs-toggle="dropdown" aria-expanded="false">
                        <span class="visually-hidden">Toggle Dropdown</span>
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/admin?debug=true"><b>正常模式</b><br><small>載入預設醫師資料，適合排班。</small></a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="/admin?debug=false"><b>UI 測試模式</b><br><small>不載入任何資料，適合測試介面。</small></a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
